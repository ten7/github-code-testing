name: "Run Playwright tests on Pantheon"
run-name: "${{ github.event.workflow_run.head_branch }} by @${{ github.event.workflow_run.actor.login }}"

on:
  workflow_run:
    workflows:
      - "Pantheon Build Edge"
      - "Pantheon Build Main"
      - "Pantheon Review Apps"
    types:
      - completed
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  get-multidev-name:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      multidev-name: ${{ steps.name.outputs.multidev-name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get multidev name
        id: name
        uses: ./.github/actions/code-testing/github/decide-test-run
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          primary-branch: ${{ vars.BROWSERSTACK_PRIMARY_BRANCH || 'main' }}
  run-playwright-tests:
    runs-on: ubuntu-latest
    needs: get-multidev-name
    steps:
      - name: Set target URL
        shell: bash
        id: set-url
        env:
          PANTHEON_SITE_NAME: ${{ vars.PANTHEON_SITE_NAME }}
          MULTIDEV_NAME: ${{ needs.get-multidev-name.outputs.multidev-name }}
        run: |
          echo "target_url=https://${MULTIDEV_NAME}-${PANTHEON_SITE_NAME}.pantheonsite.io" >> "$GITHUB_OUTPUT"

      - name: Run Playwright tests in Pantheon environment.
        uses: ./.github/actions/code-testing/playwright/test
        with:
          environment-password: ${{ secrets.PANTHEON_REVIEW_USERNAME }}
          environment-username: ${{ secrets.PANTHEON_REVIEW_PASSWORD }}
          target-url: ${{ steps.set-url.outputs.target_url }}
          test-script: 'test:ci-pantheon'