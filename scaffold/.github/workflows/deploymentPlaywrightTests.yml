name: "Run Playwright Tests on Pantheon"
run-name: "${{ github.event.deployment_status.environment }} by @${{ github.actor }}"

on:
  deployment_status: {}

jobs:
  Playwright-Tests:
    runs-on: ubuntu-latest
    if: github.event.deployment_status.state == 'success'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"

      - name: Install Terminus
        uses: pantheon-systems/terminus-github-actions@v1
        with:
          pantheon-machine-token: ${{ secrets.TERMINUS_MACHINE_TOKEN }}
          terminus-version: 4.3.1
      - name: Set multidev name
        id: multidev
        run: echo "name=${{ github.event.deployment_status.environment }}" | sed 's/pantheon-//' >> $GITHUB_OUTPUT

      - name: Wait for review app to respond
        uses: ./.github/actions/code-testing/terminus/wait-for-build
        with:
          site-name: ${{ vars.PANTHEON_SITE_NAME }}
          multidev-name: ${{ steps.multidev.outputs.name }}

      # Playwright steps go here
      - name: Checkout actions
        uses: actions/checkout@v4

      - name: Run Playwright tests
        uses: ./.github/actions/code-testing/playwright/test
        with:
          target-url: ${{ github.event.deployment_status.environment_url }}
          basic-auth-user: ${{ secrets.PANTHEON_REVIEW_USERNAME }}
          basic-auth-pass: ${{ secrets.PANTHEON_REVIEW_PASSWORD }}
          test-script: 'test:ci-pantheon'