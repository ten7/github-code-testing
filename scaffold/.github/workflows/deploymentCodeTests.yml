name: "Run Unit, Code Quality and Existing-Site Tests"
run-name: "${{ github.event.deployment_status.environment }} by @${{ github.actor }}"


on:
  deployment_status: {}
concurrency:
  group: ${{ github.workflow }}-${{ github.event.deployment_status.environment || github.run_id }}
  cancel-in-progress: true

jobs:
  detect-php-version:
    name: Detect PHP Version
    runs-on: ubuntu-latest
    outputs:
      php-version: ${{ steps.php-version.outputs.php-version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read php_version from Pantheon config
        id: php-version
        uses: ./.github/actions/code-testing/detect-php-version

  # These jobs run in parallel - they don't need the deployment. Just composer.
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: detect-php-version
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ needs.detect-php-version.outputs.php-version }}
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, dom, filter, gd, json, mbstring, pdo
          coverage: none

        # Install composer dependencies  to ensure autoloader
        # is up to date and vendor/bin/phpunit is available
      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Run Unit Tests
        run: |
          mkdir -p test-results
          ./vendor/bin/phpunit -c phpunit.xml --testsuite=unit --log-junit test-results/phpunit-unit.xml

      - name: Upload Test Results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: unit-test-results
          path: test-results/unit/

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: detect-php-version
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ needs.detect-php-version.outputs.php-version }}
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, dom, filter, gd, json, mbstring, pdo
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Run PHPCS
        run: ./vendor/bin/phpcs --report=checkstyle --report-file=phpcs-report.xml || true

      - name: Upload PHPCS Report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: phpcs-report
          path: phpcs-report.xml

  # ExistingSite tests require a full Drupal environment with database
  # This runs in parallel with deployment - uses synced DB, not multidev.
  existing-site-tests:
    name: ExistingSite Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ${{ github.workspace }}/.ddev/.drainpipe-composer-cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install and Start DDEV
        uses: ./.github/actions/drainpipe/ddev
        with:
          git-name: Drainpipe Bot
          git-email: no-reply@example.com
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          ssh-known-hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

      - name: Install Dependencies
        run: ddev composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Configure Pantheon Credentials
        run: |
          # Add Pantheon credentials to DDEV web environment
          ddev config --web-environment-add="PANTHEON_TOKEN=${{ secrets.TERMINUS_MACHINE_TOKEN }}"
          ddev config --web-environment-add="PANTHEON_SITE_ID=${{ secrets.PANTHEON_SITE_NAME }}"
          ddev config --web-environment-add="TERMINUS_MACHINE_TOKEN=${{ secrets.TERMINUS_MACHINE_TOKEN }}"
          ddev restart

      - name: Sync Database from Pantheon
        run: ddev task sync

      - name: Run Drupal Updates
        run: ddev drush deploy

      - name: Enable Stage File Proxy
        run: |
          # Enable stage_file_proxy so tests can access images from remote site
          ddev drush pm:enable stage_file_proxy -y
          # Verify it's enabled
          ddev drush pm:list --filter=stage_file_proxy --status=enabled

      - name: Reindex Solr
        if: ${{ vars.TESTING_NEEDS_SEARCH_INDEXING == 'true' }}
        run: |
          # Reindex Solr so search tests have fresh data
          ddev drush search-api:reset-tracker
          ddev drush search-api:index

      - name: Install theme dependencies
        run: ddev task assets:prod

      - name: Run ExistingSite Tests
        run: ddev task test:existing-site

      - name: Upload ExistingSite Test Results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: existing-site-test-results
          path: test-results/phpunit/

      - name: Upload Browser Output on Failure
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: existing-site-browser-output
          path: |
            test-results/phpunit/
            web/sites/simpletest/browser_output/

      # --- Playwright E2E Tests against DDEV environment ---
      - name: Get DDEV URL
        id: ddev-url
        run: |
          DDEV_URL=$(ddev describe -j | jq -r '.raw.primary_url')
          echo "url=${DDEV_URL}" >> $GITHUB_OUTPUT
          echo "DDEV URL: ${DDEV_URL}"

      - name: Run Playwright tests in DDEV
        uses: ./.github/actions/code-testing/playwright/test
        with:
          basic-auth-pass: ''
          basic-auth-user: ''
          target-url: ${{ steps.ddev-url.outputs.url }}
          test-script: 'test:ci-ddev'
