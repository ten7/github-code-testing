name: "Composer Lock Diff"

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    paths:
      - 'composer.lock'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  detect-php-version:
    name: Detect PHP Version
    runs-on: ubuntu-latest
    outputs:
      php-version: ${{ steps.php-version.outputs.php-version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read php_version from Pantheon config
        id: php-version
        uses: ./.github/actions/code-testing/detect-php-version
  Composer-Lock-Diff:
    runs-on: ubuntu-24.04
    needs: detect-php-version
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ needs.detect-php-version.outputs.php-version }}

      - name: Install composer-lock-diff
        run: composer global require davidrjonas/composer-lock-diff:^1.0

      - name: Update PR description with composer diff
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git fetch origin ${{ github.base_ref }}
          DIFF=$(~/.composer/vendor/bin/composer-lock-diff \
            --from origin/${{ github.base_ref }}:composer.lock \
            --to composer.lock \
            --md)
          
          [ -z "$DIFF" ] && echo "No composer.lock changes detected." && exit 0

          CURRENT_BODY=$(gh pr view $PR_NUMBER --json body --jq '.body // ""')

          NEW_BODY=$(CURRENT_BODY="$CURRENT_BODY" \
                     DIFF="$DIFF" \
                     python3 - <<'PYEOF'
          import os, re

          body  = os.environ['CURRENT_BODY']
          diff  = os.environ['DIFF']
          start = '<!-- composer-lock-diff-start -->'
          end   = '<!-- composer-lock-diff-end -->'

          body = re.sub(re.escape(start) + '.*?' + re.escape(end), '', body, flags=re.DOTALL).strip()

          new_section = f"{start}\n\n## Composer Lock Diff\n\n{diff}\n\n{end}"

          print((body + '\n\n' + new_section) if body else new_section, end='')
          PYEOF
          )

          gh pr edit $PR_NUMBER --body "$NEW_BODY"