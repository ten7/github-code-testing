name: "Run Browserstack tests on Pantheon"

on:
  deployment_status: { }

jobs:
  Decide-If-Tests-Should-Run:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      should-run: ${{ steps.decide.outputs.should-run }}
      multidev-name: ${{ steps.decide.outputs.multidev-name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Decide whether to run BrowserStack tests
        id: decide
        uses: ./.github/actions/code-testing/github/decide-test-run
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          primary-branch: ${{ vars.BROWSERSTACK_PRIMARY_BRANCH || 'main' }}
  Set-Up-Tests:
    runs-on: ubuntu-latest
    needs: Decide-If-Tests-Should-Run
    if: ${{ needs.Decide-If-Tests-Should-Run.outputs.should-run == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"

      - name: Install Terminus
        uses: pantheon-systems/terminus-github-actions@v1
        with:
          pantheon-machine-token: ${{ secrets.TERMINUS_MACHINE_TOKEN }}
          terminus-version: 4.3.1
      - name: Set multidev name
        id: multidev
        run: echo "name=${{ github.event.deployment_status.environment }}" | sed 's/pantheon-//' >> $GITHUB_OUTPUT

      - name: Wait for review app to respond
        uses: ./.github/actions/code-testing/terminus/wait-for-build
        with:
          site-name: ${{ vars.PANTHEON_SITE_NAME }}
          multidev-name: ${{ steps.multidev.outputs.name }}

      # Browserstack test steps go here
      - name: Checkout actions
        uses: actions/checkout@v6

      - name: Validate browserstack connection
        uses: ./.github/actions/code-testing/browserstack/validate
        with:
          enabled: ${{ vars.BROWSERSTACK_TESTS_ENABLED }}
          username: ${{ secrets.BROWSERSTACK_USERNAME }}
          access-key: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          validate-api: 'true'

      - name: Set target URL
        shell: bash
        id: set-url
        env:
          PANTHEON_SITE_NAME: ${{ vars.PANTHEON_SITE_NAME }}
          MULTIDEV_NAME: ${{ needs.Decide-If-Tests-Should-Run.outputs.multidev-name }}
        run: |
          echo "target_url=https://${MULTIDEV_NAME}-${PANTHEON_SITE_NAME}.pantheonsite.io" >> "$GITHUB_OUTPUT"

      - name: Run tests
        if: ${{ steps.validate-browserstack.outputs.available == 'true' }}
        uses: ./.github/actions/code-testing/browserstack/test
        with:
          browserstack-access-key: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          browserstack-username: ${{ secrets.BROWSERSTACK_USERNAME }}
          pantheon-review-password: ${{ secrets.PANTHEON_REVIEW_PASSWORD }}
          pantheon-review-username: ${{ secrets.PANTHEON_REVIEW_USERNAME }}
          pantheon-site-name: ${{ vars.PANTHEON_SITE_NAME }}
          target-url: ''