name: "Playwright Tests on Pantheon"
description: "Run Playwright tests against a remote environment."
inputs:
  target-url:
    description: "The url to be used as BASE_URL for the scripts"
  environment-username:
    description: "Username for basic auth to access any site that is behind a server-level username/password. If it is not needed it will be ignored."
    required: true
  environment-password:
    description: "Password for basic auth to access any site that is behind a server-level username/password. If it is not needed it will be ignored."
    required: true
  test-script:
    description: "The npm script to run (defined in test/playwright/package.json). Defaults to 'test'."
    required: false
    default: "test"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'
        cache-dependency-path: 'test/playwright/package-lock.json'
    - name: Install dependencies
      shell: bash
      run: |
        cd test/playwright
        npm ci
        npx playwright install --with-deps chromium chromium-headless-shell

    - name: Run Playwright tests
      shell: bash
      env:
        NODE_OPTIONS: --disable-warning=DEP0205
        BASE_URL: ${{ inputs.target-url }}
        BASIC_AUTH_USER: ${{ inputs.pantheon-review-username }}
        BASIC_AUTH_PASS: ${{ inputs.patheon-review-password }}
      run: |
        cd test/playwright
        mkdir -p test-results 
        npm run ${{ inputs.test-script }}
    - name: Upload test results
      if: ${{ always() }}
      uses: actions/upload-artifact@v6
      with:
        name: playwright-report
        path: test/playwright/playwright-report/
        retention-days: 5
