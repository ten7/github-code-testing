name: "Index search on a pantheon target"
description: "Runs search indexing if testing requires it."
inputs:
  pantheon-site-name:
    description: 'The site name, such as bps-district'
    required: true
  pr-number:
    description: "The Pull Request number"
    required: true
  machine-token:
    description: "The machine token needed to authorize terminus"
    required: true

runs:
  using: composite
  steps:
    - name: 'Run search indexing if needed.'
      id: search-indexing
      env:
        PANTHEON_SITE_NAME: ${{ inputs.pantheon-site-name }}
        PR_NUMBER: ${{ inputs.pr-number }}
        MACHINE_TOKEN: ${{ inputs.machine-token }}
      shell: bash
      run: |
        drainpipe_exec "terminus auth:login --machine-token="${{env.MACHINE_TOKEN}}" && \
        terminus remote:drush ${{env.PANTHEON_SITE_NAME}}.pr-${{ env.PR_NUMBER }} -- search-api:reset-tracker && \
        terminus remote:drush ${{env.PANTHEON_SITE_NAME}}.pr-${{ github.event.pull_request.number }} -- search-api:index"
